name: build and push

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------
  # Lint: cheap pre-flight on the envtoxml Rust source. ~5s on a warm
  # runner, so it's free to run before every push. Catches:
  #   - rustfmt drift (`cargo fmt --check`) — the multi-stage Docker
  #     build compiles envtoxml but does NOT check formatting, so a
  #     regressed file would otherwise reach the smoke matrix and only
  #     fail downstream reviews.
  #   - test regressions (`cargo test`) — runs the same 17 integration
  #     tests the developer runs locally, but in CI so a broken merge
  #     can't slip past review.
  #   - cross-arch release builds — `cargo build --target x86_64...musl`
  #     natively + `cross build --target aarch64...musl` via Docker.
  #     The smoke matrix also builds both arches (one per native
  #     runner), but that's behind a full docker build + s6 bringup;
  #     this lint catches arch-specific Cargo.lock / dep issues in
  #     seconds without leaving the Rust toolchain. The Dockerfile
  #     builder stage matches these targets (rustup target add + cargo
  #     build --release --target …) — if these lint builds pass, the
  #     builder's `cargo build` will too.
  # Gating `smoke` on `lint` keeps the slow multi-arch build+docker
  # run off the critical path when the source has obvious problems.
  # Toolchain pinned to 1.83 to match the Dockerfile builder stage
  # (rust:1.83-slim-bookworm); bump both together.
  # ---------------------------------------------------------------------
  lint:
    name: envtoxml fmt + tests + cross-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Cache ~/.cargo + tools/envtoxml/target across runs. Swatinem's
      # cache key is content-aware (Cargo.lock hash, source hash) so
      # unrelated commits still hit warm cache for unchanged deps.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/envtoxml -> target

      - name: Install Rust 1.83 + rustfmt + both musl targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.83
          components: rustfmt
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      # amd64 musl build: native `cargo build` on the host, only needs
      # musl-tools for the cross-linker (musl-gcc). The arm64 build
      # below uses `cross`, which brings its own cross-toolchain via
      # Docker — no host musl-gcc variant for aarch64 is needed.
      - name: Install musl-tools (amd64 musl linker)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      # `cross` is the official cross-rs wrapper — pulls a pre-built
      # Docker image with the right cross-toolchain for the target.
      # First run is ~3-5 min (cargo install + image pull); subsequent
      # runs hit Swatinem's cargo cache and skip the install.
      - name: Install cross (arm64 cross-builder via Docker)
        run: cargo install cross --locked

      - name: cargo fmt --check
        working-directory: tools/envtoxml
        run: cargo fmt --check

      - name: cargo test (amd64 native, glibc target)
        working-directory: tools/envtoxml
        run: cargo test

      - name: cargo build (amd64 musl, release)
        working-directory: tools/envtoxml
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: cross build (arm64 musl, release)
        working-directory: tools/envtoxml
        run: cross build --release --target aarch64-unknown-linux-musl

  # ---------------------------------------------------------------------
  # Smoke tests: 2 distros × 2 native arches, run in parallel.
  #
  # Each matrix entry uses a runner whose CPU matches the target arch
  # (ubuntu-24.04 for amd64, ubuntu-24.04-arm for arm64). `docker build`
  # therefore produces a native image with no QEMU emulation, and
  # `docker run` from scripts/smoke-test.sh works on the same arch.
  # Native arm64 smoke is strictly stronger than the previous QEMU
  # multi-arch build: it actually runs the binary, not just compiles
  # it. Native arm64 runners have been free for public repos on
  # GitHub since 2025.
  #
  # `fail-fast: false` lets the remaining matrix entries finish after
  # one fails, so a single distro/arch pair regression doesn't hide
  # the others from the log.
  # ---------------------------------------------------------------------
  smoke:
    name: smoke (${{ matrix.arch }}, ${{ matrix.variant }})
    needs: lint
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        variant: [debian, ubuntu]

    steps:
      - uses: actions/checkout@v4

      # Native single-arch build. The runner's CPU matches the
      # target arch, so `docker build` produces a native image
      # without QEMU. scripts/smoke-test.sh does `docker run`
      # directly on this tag — cross-arch run would need an
      # emulator the smoke test does not set up.
      - name: Build ${{ matrix.variant }} test image (native ${{ matrix.arch }})
        run: docker build -f Dockerfile.${{ matrix.variant }} -t dyrnq/hdfs:${{ matrix.variant }}-test .

      # Two auth modes per (arch, variant):
      #   kerberos — the image's normal entrypoint runs KDC + keytab
      #              + service principals, then NameNode + DataNode
      #              kinit and authenticate over SASL.
      #   simple   — same entrypoint, but with
      #              `-e HADOOP_SECURITY_AUTHENTICATION=simple`. The
      #              entrypoint strips the krb5kdc + kadmind s6
      #              services and skips KDC bootstrap + keytab +
      #              keystore. Simple-auth core/hdfs-site.xml are
      #              still bind-mounted read-only so the rendered
      #              XMLs carry Simple + HTTP_ONLY; the entrypoint's
      #              XML write-back is guarded by `[ -w ]` and
      #              skips silently when the bind is read-only.
      - name: Smoke test ${{ matrix.variant }} (kerberos, ${{ matrix.arch }})
        run: bash scripts/smoke-test.sh kerberos dyrnq/hdfs:${{ matrix.variant }}-test

      - name: Smoke test ${{ matrix.variant }} (simple, ${{ matrix.arch }})
        run: bash scripts/smoke-test.sh simple dyrnq/hdfs:${{ matrix.variant }}-test

  # ---------------------------------------------------------------------
  # Multi-arch push: gated on the per-arch smoke matrix passing.
  #
  # Step ordering matters:
  #   1. Multi-arch `--push false` first — this catches the class
  #      of bugs the per-arch smoke does NOT cover:
  #        * `uname -m` branching in the Dockerfile (s6-overlay
  #          arch selection) under QEMU+binfmt emulation
  #        * cross-platform RUN-cache / per-platform ARG scoping
  #      If this fails we abort before login, so a broken
  #      manifest never reaches DockerHub and we never burn the
  #      rate limit on a doomed push.
  #   2. Login to DockerHub — only on a clean validation.
  #   3. Multi-arch `--push true` — same images, real push.
  # ---------------------------------------------------------------------
  push:
    name: multi-arch push
    needs: smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Multi-arch build (no push) — Debian
        run: |
          ./buildx.sh --push false \
            --dockerfile Dockerfile.debian \
            --tag hdfs:latest \
            --tag hdfs:latest-debian

      - name: Multi-arch build (no push) — Ubuntu
        run: |
          ./buildx.sh --push false \
            --dockerfile Dockerfile.ubuntu \
            --tag hdfs:latest-ubuntu

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Multi-arch build & push — Debian
        run: |
          ./buildx.sh --push true \
            --dockerfile Dockerfile.debian \
            --tag hdfs:latest \
            --tag hdfs:latest-debian

      - name: Multi-arch build & push — Ubuntu
        run: |
          ./buildx.sh --push true \
            --dockerfile Dockerfile.ubuntu \
            --tag hdfs:latest-ubuntu